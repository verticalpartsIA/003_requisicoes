name: Deploy — Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Corrige e valida app no servidor via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.HOSTINGER_SSH_PASS }}
          port: 65002
          command_timeout: 8m
          script: |
            D=$HOME/domains/vprequisicoes.vpsistema.com
            NODE=/opt/alt/alt-nodejs22/root/bin/node
            cd $D/nodejs
            export PATH=/opt/alt/alt-nodejs22/root/usr/bin:$PATH
            echo "=== atualiza codigo ==="
            git fetch origin main && git reset --hard origin/main
            echo "=== symlink .env de runtime (vars do painel) ==="
            ln -sfn $D/public_html/.builds/config/.env $D/nodejs/.env && ls -la .env || true
            echo "=== valida require(server.js) como o Passenger faz ==="
            if PORT=3199 timeout 15 $NODE -e "require('./server.js'); setTimeout(() => process.exit(0), 3000);" > /tmp/vpreq-req.log 2>&1; then
              echo "REQUIRE OK — server.js compativel com Passenger"
              cat /tmp/vpreq-req.log
            else
              echo "REQUIRE FALHOU — aplicando fallback boot.cjs no htaccess:"
              cat /tmp/vpreq-req.log
              sed -i 's/^PassengerStartupFile .*/PassengerStartupFile boot.cjs/' $D/public_html/.htaccess
            fi
            grep Passenger $D/public_html/.htaccess || true
            echo "=== reinicia app ==="
            mkdir -p tmp && touch tmp/restart.txt
            sleep 5
            echo "=== testa site pelo dominio ==="
            curl -s -o /dev/null -w "GET /login => %{http_code}\n" --max-time 40 https://vprequisicoes.vpsistema.com/login || true
            echo "=== console.log do app ==="
            tail -c 1500 console.log 2>/dev/null || echo "(vazio)"
            echo "=== FIM ==="
